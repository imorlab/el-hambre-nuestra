<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar registro - El Hambre Nuestra</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #0f0e0b;">
  <table width="100%" cellpadding="0" cellspacing="0" style="width: 100%; min-height: 100vh;">
    <tr>
      <td align="center" valign="middle" style="padding: 20px;">
        <table cellpadding="0" cellspacing="0" style="background-color: #1a1915; border: 1px solid #2e2c24; border-radius: 16px; padding: 40px; max-width: 400px; width: 100%;">
          <tr>
            <td style="padding-bottom: 8px;">
              <h1 style="margin: 0; font-family: 'Playfair Display', Georgia, serif; font-size: 28px; color: #c9a84c;">El Hambre <span style="font-style: italic; color: #f0e8d5;">Nuestra</span></h1>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom: 32px;">
              <p style="margin: 0; font-size: 14px; color: #7a7560;">Gestiona tus restaurantes favoritos</p>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom: 16px;">
              <h2 style="margin: 0; font-family: 'Playfair Display', Georgia, serif; font-size: 20px; color: #f0e8d5;">Confirma tu registro</h2>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom: 24px;">
              <p style="margin: 0; font-size: 14px; color: #7a7560; line-height: 1.6;">Pulsa el botón de abajo para confirmar tu correo electrónico y empezar a usar la app.</p>
            </td>
          </tr>
          <tr>
            <td>
              <a href="{{ .ConfirmationURL }}" style="display: block; background-color: #c9a84c; color: #0f0e0b; font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 24px; border-radius: 8px; text-decoration: none; text-align: center;">Confirmar correo</a>
            </td>
          </tr>
          <tr>
            <td style="padding-top: 32px;">
              <p style="margin: 0; font-size: 12px; color: #7a7560;">Si no solicitaste este registro, puedes ignorar este correo.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
